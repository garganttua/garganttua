# This workflow will build a package using Maven on every push
# and then publish it to GitHub Packages when a push occurs on 'dev' or a tag is created on 'main'

name: Maven Package

on:
  push:
    branches: 
      - "*"  # Build on any branch push
    tags:
      - "*"  # Trigger on any tag creation

  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # build runs tests + commits the coverage badge on main
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # The AOT annotation processor is part of this reactor yet every module
    # declares it on its annotationProcessorPath, so a clean one-pass build is
    # circular. First pass installs all artifacts (incl. the processor) with
    # annotation processing disabled; the second pass runs processing normally.
    - name: Bootstrap local repo (no annotation processing)
      run: mvn -B -ntp -Pbootstrap-no-apt install -DskipTests --file pom.xml
    - name: Build with Maven
      run: mvn -B -ntp package --file pom.xml

    # Aggregate JaCoCo coverage across every module: writes the run summary,
    # refreshes the README badge, and emits target/coverage/coverage-summary.md.
    - name: Aggregate coverage
      if: always()
      run: python3 scripts/coverage.py

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage
        path: |
          **/target/site/jacoco/
          target/coverage/coverage-summary.md
        if-no-files-found: warn

    # Keep the README coverage badge fresh. Only on main pushes; [skip ci] avoids
    # re-triggering this workflow.
    - name: Commit coverage badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        if ! git diff --quiet -- README.md; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update coverage badge [skip ci]"
          git push
        fi

  # Blocking quality ratchet — runs ONLY on tags (the release/deploy path). The -Pquality profile
  # is advisory (failOnViolation=false) for day-to-day builds; here it is turned into a hard gate:
  # scripts/quality-gate.py fails the job if Checkstyle/SpotBugs/PMD counts regress above the
  # committed baseline (config/quality-baseline.json). deploy `needs` this job, so an insufficient-
  # quality tag is NOT published.
  quality-gate:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # Two-pass compile WITHOUT -Pquality (so no jacoco:check / verify-phase plugins run); this only
    # needs compiled classes in target/ for SpotBugs/PMD to analyse.
    - name: Bootstrap local repo (no annotation processing)
      run: mvn -B -ntp -Pbootstrap-no-apt install -DskipTests --file pom.xml
    - name: Compile (annotation processing on)
      run: mvn -B -ntp install -DskipTests --file pom.xml

    # Pure report goals (no verify-phase side effects). fail-at-end so every module is analysed. The
    # goals are failOnViolation=false, BUT the `spotbugs:` prefix is unresolvable on the aggregator
    # poms (spotbugs-maven-plugin lives under com.github.spotbugs, not the default plugin groups), so
    # Maven exits non-zero on that noise even though it produces every code module's report. `|| true`
    # tolerates it; the gate step below is the real arbiter and independently verifies reports exist.
    - name: Generate quality reports
      run: mvn -B -ntp -Pquality checkstyle:checkstyle spotbugs:spotbugs pmd:pmd -fae --file pom.xml || true

    # THE BLOCKING STEP: non-zero exit here fails the job → deploy is skipped. Fails on a violation
    # regression above the committed baseline OR on missing reports (analysis silently didn't run).
    - name: Enforce quality ratchet
      run: python3 scripts/quality-gate.py

    - name: Upload quality reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-quality-reports
        path: |
          **/target/checkstyle-result.xml
          **/target/spotbugsXml.xml
          **/target/pmd.xml
        if-no-files-found: warn

  deploy:
    needs: [build, quality-gate]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Generate Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'SETTINGS'
        <settings>
          <servers>
            <server>
              <id>garganttua_core_github_repository</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
            <server>
              <id>garganttua_core_github_snapshot_repository</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
          </servers>
        </settings>
        SETTINGS

    - name: Bootstrap local repo (no annotation processing)
      run: mvn -B -ntp -Pbootstrap-no-apt install -DskipTests --file pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to GitHub Packages Apache Maven
      run: mvn -B -ntp deploy
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
