# This workflow will build a package using Maven on every push
# and then publish it to GitHub Packages when a push occurs on 'dev' or a tag is created on 'main'

name: Maven Package

on:
  push:
    branches: 
      - "*"  # Build on any branch push
    tags:
      - "*"  # Trigger on any tag creation

  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # build runs tests + commits the coverage badge on main
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # The AOT annotation processor is part of this reactor yet every module
    # declares it on its annotationProcessorPath, so a clean one-pass build is
    # circular. First pass installs all artifacts (incl. the processor) with
    # annotation processing disabled; the second pass runs processing normally.
    - name: Bootstrap local repo (no annotation processing)
      run: mvn -B -ntp -Pbootstrap-no-apt install -DskipTests --file pom.xml
    - name: Build with Maven
      run: mvn -B -ntp package --file pom.xml

    # Aggregate JaCoCo coverage across every module: writes the run summary,
    # refreshes the README badge, and emits target/coverage/coverage-summary.md.
    - name: Aggregate coverage
      if: always()
      run: python3 scripts/coverage.py

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage
        path: |
          **/target/site/jacoco/
          target/coverage/coverage-summary.md
        if-no-files-found: warn

    # Keep the README coverage badge fresh. Only on main pushes; [skip ci] avoids
    # re-triggering this workflow.
    - name: Commit coverage badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        if ! git diff --quiet -- README.md; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update coverage badge [skip ci]"
          git push
        fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Generate Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'SETTINGS'
        <settings>
          <servers>
            <server>
              <id>garganttua_core_github_repository</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
            <server>
              <id>garganttua_core_github_snapshot_repository</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
          </servers>
        </settings>
        SETTINGS

    - name: Bootstrap local repo (no annotation processing)
      run: mvn -B -ntp -Pbootstrap-no-apt install -DskipTests --file pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to GitHub Packages Apache Maven
      run: mvn -B -ntp deploy
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
