## slf4j-simple configuration for the api-core test phase.
##
## garganttua-core 2.0.0-ALPHA02 has a handful of log.error(...) calls in
## fallback/recovery code paths that fire on cases the framework handles
## gracefully (ExecutableBinder parameter-binding fall-throughs, double
## lifecycle init under bootstrap rebuilds). Those messages flood the
## maven test output with red [ERROR] lines that suggest a build failure
## even when every test passes.
##
## We silence them by raising their per-class threshold to "warn" — the
## same effect as a log.warn(...) downgrade, scoped to the api test
## classpath only. Production users of garganttua-api pick their own
## logging backend and config; this file does not leak past src/test.
##
## Track this in a core evolution: ExecutableBinder.error → warn (it's a
## per-param fallback, not a fatal failure) and AbstractLifecycle.error
## → debug (Bootstrap.java line 663 already uses debug for the same
## state). Once core downgrades them, remove the per-class overrides
## below.

org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showShortLogName=true

# Per-class overrides — silence the false-positive ERRORs from core.
org.slf4j.simpleLogger.log.com.garganttua.core.reflection.binders.ExecutableBinder=warn
org.slf4j.simpleLogger.log.com.garganttua.core.reflection.binders.ContextualExecutableBinder=warn
org.slf4j.simpleLogger.log.com.garganttua.core.lifecycle.AbstractLifecycle=warn
