# git-cliff configuration for the garganttua platform (core + api + events reactor)
# https://git-cliff.org/docs/configuration
#
# Generates the auto section of the changelog from conventional commits.
# For a MAJOR release, hand-curate the headline + "Breaking changes" + migration
# guide on top of what this produces (see docs/CHANGELOG-v2.0.0-draft.md).

[changelog]
header = """
# Changelog

All notable changes to **garganttua** (core + api + events) are documented here.
This file's per-release sections are generated from [Conventional Commits](https://www.conventionalcommits.org).\n
"""
# Tera template. Groups are emitted in the order encoded by the `<!-- N -->` prefix,
# which the postprocessor then strips.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = [
  { pattern = '<!-- [0-9]+ -->', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->🛠️ Refactoring" },
  { message = "^revert", group = "<!-- 4 -->⏪ Reverts" },
  { message = "^docs", group = "<!-- 5 -->📚 Documentation" },
  { message = "^test", group = "<!-- 6 -->🧪 Tests" },
  { message = "^ci", group = "<!-- 7 -->⚙️ CI" },
  { message = "^build", group = "<!-- 7 -->⚙️ CI" },
  { message = "^chore", skip = true },
  { message = "^wip", skip = true },
  { message = "^style", skip = true },
  { message = "^.*", group = "<!-- 9 -->Other" },
]
# Mark `feat(x)!:` / `BREAKING CHANGE:` so they surface — adopt this footer in
# breaking commits going forward so the major release log builds itself.
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v?[0-9]+\\.[0-9]+\\.[0-9]+.*"
topo_order = false
sort_commits = "newest"
